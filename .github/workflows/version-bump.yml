name: Bump Custom Version

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  bump:
    if: >-
      !contains(github.event.head_commit.message, '[skip version]') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if manifest already bumped in this commit
        id: check
        shell: bash
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if git diff HEAD~1 HEAD --name-only | grep -q '^myman_manifest.json$'; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "myman_manifest.json already updated — skipping auto-bump"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bump Custom Ver and regenerate bundle
        if: steps.check.outputs.skip != 'true'
        run: node scripts/release.mjs "${{ github.event.head_commit.message }}"

      - name: Commit and push version bump
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add myman_manifest.json myman_config.js myman_suite.bundle.js myman_loader.user.js myman_loader.local.user.js myman_fouc_guard.user.js
          if git diff --staged --quiet; then
            echo "No generated files changed"
            exit 0
          fi
          git commit -m "chore: bump Custom Ver [skip version]"
          git push
